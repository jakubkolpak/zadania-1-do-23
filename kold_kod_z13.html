mam na nazwisko Kołdysz czyli siedem liter N=7<br>
mój numer z dziennika to 10<br>

;C - duży smutek<br><br>
<p>:P - pokazanie języka</p>
:O - zdziwienie<br><br>
<p>:/ - sceptycyzm</p>
:| - brak emocji
